<!DOCTYPE html>

      body { font-family: 'Inter', sans-serif; }
      .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }

<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#fafaf5]/60 dark:bg-stone-900/60 backdrop-blur-md fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4">
<div class="text-xl font-black text-[#0d631b] dark:text-green-500 font-headline">Krishi Seva</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#1a1c19] dark:text-stone-300 p-2 hover:bg-[#f4f4ef] dark:hover:bg-stone-800 transition-colors active:scale-95 duration-200">help_outline</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4">
<div class="max-w-xl w-full">
<!-- Success Status Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-24 h-24 bg-primary-container text-on-primary-container rounded-full mb-6 shadow-[0_-4px_24px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="font-headline font-extrabold text-4xl text-primary tracking-tight mb-3">Booking Confirmed!</h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-sm mx-auto">
                    Your service has been scheduled for October 4th, 2024.
                </p>
<div class="mt-4 inline-block px-4 py-1.5 bg-surface-container text-on-surface font-semibold rounded-full text-sm">
                    Booking ID: #HB-28491
                </div>
</div>
<!-- Summary Bento Grid (Simplified) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
<!-- Land Size Detail -->
<div class="bg-surface-container-low rounded-[2rem] p-6 flex flex-col justify-between">
<span class="material-symbols-outlined text-secondary text-3xl mb-4">grid_view</span>
<div>
<p class="text-on-surface-variant text-sm font-medium">Land Size</p>
<p class="text-2xl font-bold font-headline text-on-surface">10 Acres</p>
</div>
</div>
<!-- Cost Detail -->
<div class="bg-secondary-container rounded-[2rem] p-6 flex flex-col justify-between text-on-secondary-container">
<span class="material-symbols-outlined text-3xl mb-4">payments</span>
<div>
<p class="text-on-secondary-container/80 text-sm font-medium">Estimated Cost</p>
<p class="text-3xl font-black font-headline tracking-tight">₹24,000</p>
</div>
</div>
</div>
<!-- Primary Actions -->
<div class="flex flex-col gap-4 items-center">
<button class="w-full min-h-[64px] bg-primary text-on-primary rounded-xl font-bold text-lg shadow-lg hover:bg-primary-container transition-all active:scale-95 flex items-center justify-center gap-2">
                    View My Bookings
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="text-primary font-bold hover:underline py-2 px-4 transition-colors">
                    Back to Home
                </button>
</div>
<!-- Subtle Trust Indicator -->
<div class="mt-12 flex items-center justify-center gap-3 opacity-60">
<span class="material-symbols-outlined text-primary">verified_user</span>
<span class="text-xs font-semibold uppercase tracking-widest text-on-surface">Secure Agricultural Services</span>
</div>
</div>
