<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Harvest Tracker - Job in Progress</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#dadad5",
                        "surface-container": "#eeeee9",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#380d00",
                        "inverse-surface": "#2f312e",
                        "surface": "#fafaf5",
                        "surface-container-highest": "#e3e3de",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "background": "#fafaf5",
                        "on-background": "#1a1c19",
                        "inverse-primary": "#88d982",
                        "outline": "#707a6c",
                        "on-secondary-fixed": "#2a1800",
                        "on-primary-fixed-variant": "#005312",
                        "surface-container-high": "#e8e8e3",
                        "inverse-on-surface": "#f1f1ec",
                        "tertiary": "#993300",
                        "primary": "#0d631b",
                        "tertiary-fixed-dim": "#ffb59a",
                        "primary-container": "#2e7d32",
                        "on-surface-variant": "#40493d",
                        "on-error": "#ffffff",
                        "secondary": "#835400",
                        "outline-variant": "#bfcaba",
                        "surface-bright": "#fafaf5",
                        "on-primary-container": "#cbffc2",
                        "on-secondary-fixed-variant": "#643f00",
                        "surface-container-low": "#f4f4ef",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#a3f69c",
                        "on-secondary-container": "#694300",
                        "secondary-fixed-dim": "#ffb957",
                        "on-tertiary-fixed-variant": "#802a00",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#ffeee8",
                        "on-primary-fixed": "#002204",
                        "surface-variant": "#e3e3de",
                        "on-surface": "#1a1c19",
                        "secondary-container": "#fcab28",
                        "tertiary-container": "#c24300",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#ffddb5",
                        "surface-tint": "#1b6d24",
                        "primary-fixed-dim": "#88d982",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdbcf"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .headline { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fafaf5]/60 backdrop-blur-md">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-[#f4f4ef] transition-colors rounded-full text-[#0d631b] active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#0d631b]">Job in Progress</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a smiling middle-aged Indian man with a weathered face wearing a traditional turban and linen shirt" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgwsO_xqbwOPkY8JgScshOzal-P0tg9TSrQ-n5YDltsPtLBknQZ7Ls99KVsMkTPxqE7s2r3tep6TAQ-mnKxAV5PcPVku2MieQVCJPd6YSRH0VgnDEwUnogxW3KUVwbj7kOysn8gZiTUNRVPsN9FnR8znVtHnn_Z8d1NsO5cr8GPRQVLPhqXEsdaWshaXSwQdhovPo3V-BCgZ9SyrcTf5KU0PtKFwdJojAPa2GdiDGFg2_foSun76NbKelYLVUVBCiVHsrjN8Gs-eum"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-20 px-4 max-w-screen-xl mx-auto w-full pb-8">
<!-- Timer Bento Grid Section -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
<!-- Active Tracking Card -->
<div class="bg-surface-container-lowest p-8 rounded-3xl flex flex-col items-center justify-center text-center shadow-[0_4px_24px_0_rgba(0,0,0,0.04)] relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-primary-container"></div>
<span class="text-label-sm font-bold tracking-widest text-primary uppercase mb-4">ACTIVE DURATION</span>
<div class="text-6xl md:text-7xl font-headline font-extrabold tracking-tight text-on-surface mb-2">
                    01:24:45
                </div>
<div class="flex items-center gap-2 text-primary-container">
<span class="material-symbols-outlined animate-pulse" data-icon="circle" style="font-variation-settings: 'FILL' 1;">circle</span>
<span class="font-medium">Tracking Live</span>
</div>
</div>
<!-- Earnings & Rate Card -->
<div class="grid grid-cols-1 gap-4">
<div class="bg-primary-container bg-gradient-to-br from-primary to-primary-container p-6 rounded-3xl text-on-primary-container flex justify-between items-center">
<div>
<p class="text-sm font-medium opacity-80 mb-1">Estimated Earnings</p>
<h2 class="text-3xl font-headline font-extrabold">₹1,800</h2>
</div>
<div class="bg-on-primary-container/20 p-3 rounded-2xl">
<span class="material-symbols-outlined text-3xl" data-icon="payments">payments</span>
</div>
</div>
<div class="bg-surface-container-low p-6 rounded-3xl flex justify-between items-center">
<div>
<p class="text-sm font-medium text-on-surface-variant mb-1">Work Rate</p>
<h2 class="text-2xl font-headline font-bold text-on-surface">₹1,200/acre</h2>
</div>
<div class="text-secondary">
<span class="material-symbols-outlined text-3xl" data-icon="speed">speed</span>
</div>
</div>
</div>
</section>
<!-- Job Details Section -->
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="bg-surface-container-low p-5 rounded-3xl">
<span class="material-symbols-outlined text-primary mb-3" data-icon="person">person</span>
<p class="text-xs font-medium text-on-surface-variant uppercase tracking-wider mb-1">Farmer</p>
<p class="font-headline font-bold text-on-surface">Amandeep Singh</p>
</div>
<div class="bg-surface-container-low p-5 rounded-3xl">
<span class="material-symbols-outlined text-primary mb-3" data-icon="grass">grass</span>
<p class="text-xs font-medium text-on-surface-variant uppercase tracking-wider mb-1">Crop Type</p>
<p class="font-headline font-bold text-on-surface">Basmati Rice</p>
</div>
</div>
<!-- Action Controls -->
<section class="flex flex-col gap-4">
<button class="w-full h-20 bg-surface-container-highest/50 border-2 border-dashed border-outline-variant rounded-3xl flex items-center justify-center gap-3 text-on-surface-variant font-bold opacity-50 cursor-not-allowed">
<span class="material-symbols-outlined" data-icon="play_arrow">play_arrow</span>
                Start Work
            </button>
<button class="w-full h-20 bg-error bg-gradient-to-br from-error to-[#93000a] text-on-error rounded-3xl flex items-center justify-center gap-3 text-xl font-headline font-bold shadow-lg shadow-error/20 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-3xl" data-icon="stop_circle" style="font-variation-settings: 'FILL' 1;">stop_circle</span>
                End Work
            </button>
</section>
<!-- Contextual Visual: Field Map or Harvester Status -->
<div class="mt-8 rounded-3xl overflow-hidden h-48 relative bg-surface-container-high group">
<img alt="Wheat Field" class="w-full h-full object-cover brightness-75" data-alt="Aerial cinematic shot of a vast golden rice field with a large harvester machine creating geometric patterns during harvest" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZAv2nyXgrEv8dNTgod1Vze3lilpYinr07_SK19Q7EWwPMlp5D8cH4qxl0chmhk7cno0LMQj8DFze5GRqHUfIYocSMPqDT0d6aYya96t6DLq83snmao7GFircaTkxNfordu6DG3lCO4T5CAxI_ANs9STJdyO0RofGIpMv7I0mk8F9MRrVHVdN_iIvaacenK8c0eUloUsKiSaAMDSdZAZzvqKgYOwHZVdCr9XLy7rPrX2_Hvb87YdBDOuvsNxCf2s2S1-0kqllm8a4p"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-6">
<div class="flex items-center gap-2 text-white">
<span class="material-symbols-outlined text-sm" data-icon="location_on">location_on</span>
<span class="text-sm font-medium">Sangrur, Punjab</span>
</div>
<h3 class="text-white font-headline font-bold">Block 4A - North Field</h3>
</div>
</div>
</main>
<!-- BottomNavBar -->
</body></html>
